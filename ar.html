<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Articket · AR Viewer</title>
    <!-- Must run before AR.js to intercept camera selection from URL param -->
    <script>
      (function () {
        // --- On-screen debug reporter (no devtools on phones) ---
        var log = function (msg, color) {
          var el = document.getElementById("dbg");
          if (!el) {
            el = document.createElement("div");
            el.id = "dbg";
            el.style.cssText =
              "position:fixed;left:0;bottom:0;z-index:100000;max-height:45%;overflow:auto;" +
              "width:100%;background:rgba(0,0,0,.85);color:#0f0;font:11px/1.4 monospace;" +
              "padding:6px;white-space:pre-wrap;pointer-events:none;";
            (document.body || document.documentElement).appendChild(el);
          }
          el.textContent += (color === "err" ? "❌ " : "• ") + msg + "\n";
        };
        window.addEventListener("error", function (e) {
          log("error: " + (e.message || e.error), "err");
        });
        window.addEventListener("unhandledrejection", function (e) {
          log("reject: " + (e.reason && (e.reason.name + ": " + e.reason.message)), "err");
        });

        var cam = new URLSearchParams(location.search).get("cam");
        log("cam param: " + (cam || "(none)"));
        var orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getUserMedia = function (c) {
          if (cam) {
            // Replace AR.js's video constraints entirely. Merging deviceId on top
            // of AR.js's facingMode/width can make mobile browsers drop the track
            // (stream blinks then dies). Pin only the chosen device.
            c = c || {};
            c.video = { deviceId: { exact: cam } };
          }
          log("getUserMedia req: " + JSON.stringify(c));
          return orig(c).then(
            function (stream) {
              var t = stream.getVideoTracks()[0];
              log("stream OK: " + (t && t.label));
              if (t) {
                log("settings: " + JSON.stringify(t.getSettings && t.getSettings()));
                t.addEventListener("ended", function () {
                  log("track ENDED (stream stopped)", "err");
                });
                t.addEventListener("mute", function () {
                  log("track MUTED", "err");
                });
              }
              return stream;
            },
            function (err) {
              log("getUserMedia FAIL: " + err.name + " — " + err.message, "err");
              throw err;
            },
          );
        };
      })();
    </script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <script type="module" src="/src/ar/index.ts"></script>
  </head>
  <body>
    <!--
      Blocker renders before A-Frame canvas — TS module either populates it with
      the picker (no ?cam) or removes it immediately (?cam present).
    -->
    <div
      id="cam-blocker"
      style="
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        color: white;
        gap: 1.2rem;
      "
    >
      <p style="opacity: 0.5; font-size: 0.85rem">Initializing cameras…</p>
    </div>
    <a-scene
      id="ar-scene"
      arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: ARUCO_4X4_1000; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true; antialias: true;"
      vr-mode-ui="enabled: false"
      embedded
    >
      <a-marker type="barcode" value="0" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="1" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="2" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="3" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="4" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="5" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="6" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="7" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="8" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="9" smooth="true" smoothCount="5"></a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
