<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Articket · AR Viewer</title>
    <!-- Must run before AR.js to intercept camera selection from URL param -->
    <script>
      (function () {
        var cam = new URLSearchParams(location.search).get("cam");
        if (cam) {
          var orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
          navigator.mediaDevices.getUserMedia = function (c) {
            if (c && c.video) {
              c.video =
                typeof c.video === "object"
                  ? Object.assign({}, c.video, { deviceId: { exact: cam } })
                  : { deviceId: { exact: cam } };
            }
            return orig(c);
          };
        }
      })();
    </script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <script type="module" src="/src/ar/index.ts"></script>
  </head>
  <body>
    <!--
      Blocker renders before A-Frame canvas — TS module either populates it with
      the picker (no ?cam) or removes it immediately (?cam present).
    -->
    <div
      id="cam-blocker"
      style="
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        color: white;
        gap: 1.2rem;
      "
    >
      <p style="opacity: 0.5; font-size: 0.85rem">Initializing cameras…</p>
    </div>
    <a-scene
      id="ar-scene"
      arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: ARUCO_4X4_1000; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true; antialias: true;"
      vr-mode-ui="enabled: false"
      embedded
    >
      <a-marker type="barcode" value="0" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="1" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="2" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="3" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="4" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="5" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="6" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="7" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="8" smooth="true" smoothCount="5"></a-marker>
      <a-marker type="barcode" value="9" smooth="true" smoothCount="5"></a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
